name: Build AE Plugin

# Manual trigger only: open the repo's "Actions" tab, pick this workflow, and
# click "Run workflow". It needs the Adobe After Effects SDK, supplied either
# as a release tagged `sdk` (drag-and-drop the SDK .zip there) or via the
# AESDK_URL secret. See docs/auto-build.md for click-by-click instructions.
#
# Adobe packages the SDK as a .tar.zstd inside a nested .zip inside the outer
# .zip (AfterEffectsSDK_*_mac.zip). Both macOS and Windows steps handle this.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    name: macOS (.plugin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get After Effects SDK
        env:
          GH_TOKEN: ${{ github.token }}
          AESDK_URL: ${{ secrets.AESDK_URL }}
        run: |
          set -e
          if [ -n "$AESDK_URL" ]; then
            echo "Downloading SDK from AESDK_URL secret"
            curl -fL "$AESDK_URL" -o sdk_download.zip
          else
            echo "Downloading SDK from the 'sdk' release"
            if ! gh release download sdk --repo "$GITHUB_REPOSITORY" --dir . --pattern '*.zip' --clobber; then
              echo "::error::AE SDK not found. Upload the SDK .zip to a release tagged 'sdk', or set the AESDK_URL secret. See docs/auto-build.md."
              exit 1
            fi
            mv "$(ls *.zip | head -n1)" sdk_download.zip
          fi

          # Unzip the outer wrapper
          unzip -q sdk_download.zip -d sdk_tmp

          # Adobe SDK 25.x+: the real archive is named *.tar.zstd.zip but
          # is actually a raw .tar.zstd (the .zip suffix is cosmetic).
          # Exclude __MACOSX metadata entries (prefixed with ._).
          INNER=$(find sdk_tmp -not -path '*/__MACOSX/*' -name '*.tar.zstd.zip' | head -n1)
          if [ -n "$INNER" ]; then
            echo "Found zstd SDK archive: $INNER"
            # Prefer bundled zstd binary; fall back to system zstd or brew
            ZSTD_BIN=$(find sdk_tmp -not -path '*/__MACOSX/*' -name 'zstd' -type f | head -n1)
            if [ -n "$ZSTD_BIN" ]; then
              chmod +x "$ZSTD_BIN"
            elif command -v zstd >/dev/null 2>&1; then
              ZSTD_BIN=zstd
            else
              brew install zstd
              ZSTD_BIN=zstd
            fi
            mkdir -p sdk
            # File is a .tar.zstd despite the .zip suffix — pipe directly into tar
            "$ZSTD_BIN" -d "$INNER" --stdout | tar -xC sdk
          else
            # Standard layout: the outer zip IS the SDK
            mv sdk_tmp sdk
          fi

      - name: Locate SDK root
        id: sdk
        run: |
          echo "=== SDK structure (first 60 entries) ==="
          find "$PWD/sdk" -maxdepth 5 | head -60
          HDR=$(find "$PWD/sdk" -type f -name AE_Effect.h | head -n1)
          if [ -z "$HDR" ]; then echo "::error::AE_Effect.h not found inside the SDK zip."; exit 1; fi
          HDR_DIR=$(dirname "$HDR")
          if [ "$(basename "$HDR_DIR")" = "Headers" ]; then
            ROOT=$(dirname "$HDR_DIR")
          else
            ROOT="$HDR_DIR"
          fi
          echo "Found SDK root: $ROOT"
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Put Rez on PATH
        run: echo "$(dirname "$(xcrun --find Rez)")" >> "$GITHUB_PATH"

      - name: Configure & build
        run: |
          cmake -B build -G Xcode -DAESDK_ROOT="${{ steps.sdk.outputs.root }}"
          cmake --build build --config Release

      - name: Package
        run: |
          PLUGIN=$(find build -maxdepth 3 -name '*.plugin' -type d | head -n1)
          if [ -z "$PLUGIN" ]; then echo "::error::No .plugin bundle produced."; exit 1; fi
          echo "Built: $PLUGIN"
          ditto -c -k --sequesterRsrc --keepParent "$PLUGIN" HalftoneTornEdges-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: HalftoneTornEdges-macOS
          path: HalftoneTornEdges-macOS.zip
          if-no-files-found: error

  windows:
    name: Windows (.aex)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get After Effects SDK
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          AESDK_URL: ${{ secrets.AESDK_URL }}
        run: |
          if ($env:AESDK_URL) {
            Write-Host "Downloading SDK from AESDK_URL secret"
            curl.exe -fL $env:AESDK_URL -o sdk_download.zip
          } else {
            Write-Host "Downloading SDK from the 'sdk' release"
            gh release download sdk --repo $env:GITHUB_REPOSITORY --dir . --pattern *.zip --clobber
            if ($LASTEXITCODE -ne 0) {
              Write-Error "AE SDK not found. Upload the SDK .zip to a release tagged 'sdk', or set the AESDK_URL secret. See docs/auto-build.md."
              exit 1
            }
            Get-ChildItem *.zip | Select-Object -First 1 | Rename-Item -NewName sdk_download.zip
          }

          Expand-Archive -Path sdk_download.zip -DestinationPath sdk_tmp -Force

          # Adobe SDK 25.x+: named *.tar.zstd.zip but is actually a raw .tar.zstd.
          # Exclude __MACOSX metadata (files starting with ._).
          $inner = Get-ChildItem -Path sdk_tmp -Recurse -Filter '*.tar.zstd.zip' |
            Where-Object { $_.FullName -notlike '*\__MACOSX\*' -and $_.Name -notlike '._*' } |
            Select-Object -First 1
          if ($inner) {
            Write-Host "Found zstd SDK archive: $($inner.FullName)"
            # Install zstd if not present
            $zstdExe = (Get-Command zstd -ErrorAction SilentlyContinue)
            if (-not $zstdExe) {
              choco install zstandard -y --no-progress 2>&1 | Out-Null
              $zstdExe = "C:\ProgramData\chocolatey\bin\zstd.exe"
            } else {
              $zstdExe = $zstdExe.Source
            }
            New-Item -ItemType Directory -Force -Path sdk | Out-Null
            # File is a .tar.zstd despite the .zip suffix — decompress then untar
            & $zstdExe -d $inner.FullName -o sdk_raw.tar
            tar -xf sdk_raw.tar -C sdk
          } else {
            Rename-Item sdk_tmp sdk
          }

      - name: Locate SDK root
        id: sdk
        shell: pwsh
        run: |
          Write-Host "=== SDK structure (first 60 entries) ==="
          Get-ChildItem -Path sdk -Recurse -Depth 5 | Select-Object -First 60 | ForEach-Object { $_.FullName }
          $hdr = Get-ChildItem -Path sdk -Recurse -Filter AE_Effect.h | Select-Object -First 1
          if (-not $hdr) { Write-Error "AE_Effect.h not found inside the SDK zip."; exit 1 }
          $hdrDir = Split-Path $hdr.FullName
          if ((Split-Path $hdrDir -Leaf) -eq "Headers") {
            $root = Split-Path $hdrDir
          } else {
            $root = $hdrDir
          }
          Write-Host "Found SDK root: $root"
          "root=$root" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure & build
        shell: pwsh
        run: |
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DAESDK_ROOT="${{ steps.sdk.outputs.root }}"
          cmake --build build

      - name: Package
        shell: pwsh
        run: |
          $aex = Get-ChildItem -Path build -Recurse -Filter *.aex | Select-Object -First 1
          if (-not $aex) { Write-Error "No .aex produced."; exit 1 }
          Write-Host "Built: $($aex.FullName)"
          Compress-Archive -Path $aex.FullName -DestinationPath HalftoneTornEdges-Windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: HalftoneTornEdges-Windows
          path: HalftoneTornEdges-Windows.zip
          if-no-files-found: error
